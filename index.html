<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cubby Reads 🐻</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --honey: #F5A623;
    --honey-dark: #D4881A;
    --forest: #2D6A4F;
    --forest-light: #52B788;
    --forest-pale: #D8F3DC;
    --bark: #6B4226;
    --cream: #FFF9F0;
    --sky: #B7E4F9;
    --sky-dark: #4AACDA;
    --red-soft: #FF6B6B;
    --purple-soft: #9B79D1;
    --letter-bg: #FFFBF0;
    --shadow: 0 8px 32px rgba(45,106,79,0.13);
    --shadow-sm: 0 3px 12px rgba(45,106,79,0.10);
    --radius: 24px;
    --radius-sm: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-trees {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 10% 90%, rgba(82,183,136,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 85%, rgba(82,183,136,0.13) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 0%, rgba(245,166,35,0.10) 0%, transparent 60%),
      var(--cream);
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    background: var(--forest);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(45,106,79,0.25);
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800;
    color: var(--honey); letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo-bear { font-size: 2.2rem; animation: bearBob 2.5s ease-in-out infinite; }
  @keyframes bearBob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-5px) rotate(3deg)} }

  .header-btns { display: flex; gap: 10px; }
  .btn-sm {
    padding: 8px 18px; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .btn-outline {
    background: transparent; border: 2px solid rgba(255,255,255,0.5); color: white;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.15); border-color: white; }
  .btn-honey { background: var(--honey); color: var(--bark); }
  .btn-honey:hover { background: var(--honey-dark); transform: translateY(-1px); }

  /* ── MAIN LAYOUT ── */
  main { position: relative; z-index: 5; max-width: 860px; margin: 0 auto; padding: 28px 20px 60px;
    /* iOS notch / home-bar safe area */
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    padding-bottom: max(60px, calc(60px + env(safe-area-inset-bottom)));
  }

  /* ── SECTION TABS ── */
  .section-nav {
    display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center;
  }
  .tab-btn {
    padding: 10px 20px; border-radius: 50px; border: 2px solid transparent;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; transition: all 0.22s; background: white; color: #555;
    box-shadow: var(--shadow-sm);
  }
  .tab-btn.active { background: var(--forest); color: white; border-color: var(--forest); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(45,106,79,0.28); }
  .tab-btn:hover:not(.active) { border-color: var(--forest-light); color: var(--forest); }

  /* ── CARDS ── */
  .card {
    background: white; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 36px 32px; margin-bottom: 24px; animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  /* ── CUBBY MASCOT ── */
  .cubby-wrap {
    display: flex; align-items: flex-end; gap: 18px; margin-bottom: 26px;
  }
  .cubby-svg { flex-shrink: 0; }
  .cubby-bubble {
    background: var(--forest-pale); border-radius: 18px 18px 18px 4px;
    padding: 14px 20px; font-size: 1.1rem; font-weight: 700; color: var(--forest);
    line-height: 1.4; position: relative; box-shadow: var(--shadow-sm);
    animation: bubblePop 0.3s cubic-bezier(.175,.885,.32,1.275) both;
  }
  @keyframes bubblePop { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }

  /* ── LETTER DISPLAY ── */
  .letter-display {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin: 24px 0;
  }
  .letter-card {
    width: 140px; height: 140px; border-radius: 20px;
    background: linear-gradient(135deg, var(--honey) 0%, #FFD07A 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 5rem; font-weight: 800;
    color: var(--bark); box-shadow: 0 8px 28px rgba(245,166,35,0.35);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    user-select: none; line-height: 1;
  }
  .letter-card:hover { transform: scale(1.06) rotate(-2deg); box-shadow: 0 14px 36px rgba(245,166,35,0.45); }
  .letter-card .lower { font-size: 3rem; color: rgba(107,66,38,0.6); }

  .picture-card {
    flex: 1; border-radius: 20px; background: var(--forest-pale);
    padding: 20px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 140px; gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .picture-emoji { font-size: 5rem; line-height: 1; }
  .picture-word {
    font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 700;
    color: var(--forest); letter-spacing: 1px;
  }

  /* ── MIC BUTTON ── */
  .mic-section { display: flex; flex-direction: column; align-items: center; gap: 14px; margin: 20px 0; }
  .mic-btn {
    width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-light) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; box-shadow: 0 8px 28px rgba(45,106,79,0.35);
    transition: all 0.2s; position: relative;
  }
  .mic-btn:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(45,106,79,0.45); }
  .mic-btn.listening { animation: pulse 1.2s ease-in-out infinite; background: linear-gradient(135deg, var(--red-soft) 0%, #FF9999 100%); }
  @keyframes pulse {
    0%,100%{ box-shadow: 0 8px 28px rgba(255,107,107,0.4), 0 0 0 0 rgba(255,107,107,0.4); }
    50%{ box-shadow: 0 8px 28px rgba(255,107,107,0.4), 0 0 0 18px rgba(255,107,107,0); }
  }
  .wave-bars {
    display: flex; align-items: center; gap: 4px; height: 28px;
    opacity: 0; transition: opacity 0.3s;
  }
  .wave-bars.active { opacity: 1; }
  .wave-bar {
    width: 5px; background: var(--forest-light); border-radius: 3px;
    animation: waveBar 0.8s ease-in-out infinite;
  }
  .wave-bar:nth-child(1){height:10px;animation-delay:0s}
  .wave-bar:nth-child(2){height:20px;animation-delay:0.12s}
  .wave-bar:nth-child(3){height:28px;animation-delay:0.24s}
  .wave-bar:nth-child(4){height:18px;animation-delay:0.36s}
  .wave-bar:nth-child(5){height:12px;animation-delay:0.48s}
  @keyframes waveBar { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }

  .feedback-msg {
    font-size: 1.15rem; font-weight: 800; text-align: center; min-height: 28px;
    transition: all 0.3s;
  }
  .feedback-msg.correct { color: var(--forest); }
  .feedback-msg.try-again { color: var(--honey-dark); }

  /* ── KEYBOARD ── */
  .keyboard-section { margin-top: 22px; }
  .keyboard-section h4 { font-size: 1rem; font-weight: 700; color: #888; margin-bottom: 12px; text-align: center; }
  .type-display {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; min-height: 60px; align-items: center;
  }
  .type-box {
    width: 52px; height: 60px; border-radius: 12px;
    background: var(--letter-bg); border: 3px solid var(--forest-pale);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800; color: var(--forest);
    transition: all 0.2s;
  }
  .type-box.filled { border-color: var(--forest-light); background: var(--forest-pale); }
  .type-box.correct-box { border-color: var(--forest); background: #C7F2D0; animation: popIn 0.3s cubic-bezier(.175,.885,.32,1.275); }
  .type-box.wrong-box { border-color: var(--red-soft); background: #FFE5E5; animation: shake 0.4s; }
  @keyframes popIn { 0%{transform:scale(0.7)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ── ELKONIN BLENDING TRACK ── */
  .blending-track {
    display: flex; justify-content: center; align-items: center;
    gap: 28px; margin: 4px 0 18px; position: relative;
  }
  .blending-track::before {
    /* connector line behind dots */
    content: ''; position: absolute;
    left: calc(50% - 40px); right: calc(50% - 40px);
    height: 3px; background: var(--forest-pale);
    border-radius: 99px; z-index: 0;
  }
  .blend-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--forest-pale); border: 2.5px solid #CCC;
    position: relative; z-index: 1;
    transition: background 0.25s, border-color 0.25s, transform 0.18s;
    cursor: pointer; touch-action: none;
  }
  .blend-dot.lit {
    background: var(--honey);
    border-color: var(--honey-dark);
    box-shadow: 0 0 0 4px rgba(245,166,35,0.25);
  }
  .blend-dot.drag-active {
    transform: scale(1.45);
    background: var(--forest);
    border-color: var(--forest);
    box-shadow: 0 0 0 6px rgba(45,106,79,0.2);
  }
  .blend-label {
    font-size: 0.72rem; font-weight: 800; color: #AAA;
    text-align: center; margin-top: 4px; letter-spacing: 1px;
    user-select: none;
  }

  .keyboard { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .key-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .key {
    width: 52px; height: 52px; border-radius: 12px;
    background: white; border: 2px solid #E8E8E8;
    font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 700; color: #444;
    cursor: pointer; transition: all 0.15s; box-shadow: 0 3px 0 #DDD;
    display: flex; align-items: center; justify-content: center;
  }
  .key:hover { background: var(--forest-pale); border-color: var(--forest-light); transform: translateY(-2px); box-shadow: 0 5px 0 var(--forest-light); }
  .key:active { transform: translateY(1px); box-shadow: 0 1px 0 #CCC; }
  .key.key-highlight { background: var(--forest-pale); border-color: var(--forest); animation: keyGlow 0.8s ease infinite alternate; }
  @keyframes keyGlow { from{box-shadow:0 3px 0 var(--forest)} to{box-shadow:0 3px 16px rgba(45,106,79,0.5)} }
  .key-back {
    width: 70px; font-size: 1rem; background: #FFF0F0; border-color: #FFD0D0; color: var(--red-soft);
  }

  /* ── PROGRESS BAR ── */
  .session-progress { margin-bottom: 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 700; color: #888; margin-bottom: 6px; }
  .progress-track { height: 14px; background: var(--forest-pale); border-radius: 50px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 50px;
    background: linear-gradient(90deg, var(--forest-light), var(--forest));
    transition: width 0.5s cubic-bezier(.25,.8,.25,1);
  }

  /* ── NAV ARROWS ── */
  .nav-controls {
    display: flex; justify-content: space-between; align-items: center; margin-top: 28px;
  }
  .btn-nav {
    padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem;
    transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-prev { background: var(--forest-pale); color: var(--forest); }
  .btn-prev:hover { background: #B7DBCA; }
  .btn-next { background: var(--forest); color: white; box-shadow: 0 5px 18px rgba(45,106,79,0.3); }
  .btn-next:hover { background: var(--honey); color: var(--bark); transform: translateY(-2px); }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── CELEBRATION ── */
  .celebration { display: none; position: fixed; inset: 0; z-index: 999; pointer-events: none; }
  .celebration.show { display: block; }
  .confetti-piece {
    position: absolute; width: 12px; height: 12px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* ── TEACHER PANEL ── */
  .panel-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  .panel-overlay.open { display: flex; }
  .panel-card {
    background: white; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 36px; width: 90%; max-width: 540px; max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .panel-card h2 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; color: var(--forest); margin-bottom: 22px; }
  .pin-gate { text-align: center; }
  .pin-gate p { color: #888; margin-bottom: 16px; }
  .pin-input {
    width: 160px; text-align: center; letter-spacing: 8px;
    font-size: 1.5rem; font-weight: 800; padding: 12px;
    border: 3px solid var(--forest-pale); border-radius: 14px; outline: none;
    font-family: 'Baloo 2', cursive;
  }
  .pin-input:focus { border-color: var(--forest); }

  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--forest-pale);
  }
  .setting-label { font-weight: 700; color: #444; }
  .setting-sub { font-size: 0.82rem; color: #999; margin-top: 2px; }

  .toggle {
    width: 52px; height: 28px; border-radius: 50px; border: none;
    background: #DDD; cursor: pointer; position: relative; transition: background 0.3s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--forest); }
  .toggle::after {
    content:''; position:absolute; width:22px; height:22px;
    background:white; border-radius:50%; top:3px; left:3px;
    transition:transform 0.3s; box-shadow:0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle.on::after { transform:translateX(24px); }

  .slider-wrap { display: flex; align-items: center; gap: 12px; }
  .range-slider { width: 120px; accent-color: var(--forest); }
  .slider-val { font-weight: 800; color: var(--forest); min-width: 28px; text-align: center; }

  .profile-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .profile-tab {
    padding:8px 18px; border-radius:50px; border:2px solid var(--forest-pale);
    font-weight:700; cursor:pointer; font-size:0.9rem; transition:all 0.2s;
    background:white; color:#888;
  }
  .profile-tab.active { background:var(--forest); color:white; border-color:var(--forest); }

  .progress-report {
    background:var(--forest-pale); border-radius:var(--radius-sm); padding:16px; margin-top:8px;
  }
  .report-row { display:flex; justify-content:space-between; font-size:0.92rem; padding:4px 0; }
  .report-val { font-weight:800; color:var(--forest); }
  .report-section-row {
    display:flex; flex-direction:column; gap:4px; padding:8px 0;
    border-bottom:1px solid rgba(0,0,0,0.06);
  }
  .report-section-row:last-child { border-bottom:none; }
  .report-section-top {
    display:flex; justify-content:space-between; align-items:center;
    font-size:0.92rem; font-weight:700;
  }
  .report-section-count {
    font-weight:800; color:var(--forest); font-size:0.9rem; white-space:nowrap;
  }
  .report-bar-track {
    height:8px; background:rgba(0,0,0,0.08); border-radius:99px; overflow:hidden;
  }
  .report-bar-fill {
    height:100%; border-radius:99px; background:var(--forest);
    transition:width 0.4s ease;
  }
  .report-bar-fill.complete { background:var(--honey-dark); }
  .report-badge {
    font-size:0.75rem; font-weight:800; padding:2px 8px; border-radius:99px;
    background:var(--honey); color:var(--bark);
  }
  .report-locked { color:#aaa; font-size:0.85rem; }

  /* Heart Words — irregular letter highlighting */
  .hw-word-display {
    display:inline-flex; gap:0; align-items:flex-end;
    font-family:'Baloo 2',cursive; font-size:4rem; font-weight:900;
    color:var(--bark); background:linear-gradient(135deg,var(--honey),#FFD07A);
    padding:16px 40px; border-radius:20px;
    box-shadow:0 8px 28px rgba(245,166,35,0.35);
    cursor:pointer; letter-spacing:2px;
  }
  .hw-letter {
    position:relative; display:inline-flex;
    flex-direction:column; align-items:center;
  }
  .heart-badge {
    position:absolute; top:-22px; left:50%; transform:translateX(-50%);
    font-size:0.95rem; line-height:1;
    animation: heartPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes heartPop {
    from { opacity:0; transform:translateX(-50%) scale(0.3); }
    to   { opacity:1; transform:translateX(-50%) scale(1); }
  }
  .hw-letter.is-heart { color:#c0392b; }

  /* ── STORIES TAB ── */
  .stories-grid-wrap { padding: 0 0 40px; }
  .stories-header { text-align:center; padding:16px 0 20px; }
  .stories-overall-bar {
    height:8px; background:rgba(0,0,0,0.08); border-radius:99px;
    overflow:hidden; max-width:200px; margin:8px auto 0;
  }
  .stories-overall-fill {
    height:100%; background:var(--forest); border-radius:99px; transition:width 0.5s ease;
  }
  .stories-grid {
    display:grid; grid-template-columns:repeat(2,1fr); gap:14px;
    padding:0 4px;
  }
  @media(max-width:400px){ .stories-grid{grid-template-columns:1fr;} }

  .story-card-thumb {
    border-radius:20px; padding:18px 14px 14px; border:3px solid transparent;
    cursor:pointer; position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
    box-shadow:0 3px 12px rgba(0,0,0,0.08);
  }
  .story-card-thumb:active { transform:scale(0.96); }
  .story-thumb-emoji { font-size:2.5rem; line-height:1; margin-bottom:8px; }
  .story-thumb-title {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:1rem;
    color:var(--bark); margin-bottom:4px; line-height:1.2;
  }
  .story-thumb-focus { font-size:0.72rem; color:#888; font-weight:600; line-height:1.3; }
  .story-done-badge {
    position:absolute; top:10px; right:10px;
    background:var(--forest); color:white;
    font-size:0.68rem; font-weight:800; padding:3px 8px; border-radius:99px;
  }
  .story-locked { opacity:0.65; }
  .story-lock-overlay {
    position:absolute; inset:0; background:rgba(255,255,255,0.72);
    border-radius:18px; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-size:1.6rem; color:#888; font-weight:700;
    pointer-events:none;
  }
  .story-lock-overlay span { font-size:0.72rem; margin-top:4px; }
  @keyframes storyShake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .story-shake { animation:storyShake 0.4s ease; }

  /* Story read view */
  .story-read-wrap { padding-bottom:40px; }
  .story-back-btn {
    background:none; border:none; color:var(--forest);
    font-weight:800; font-size:0.95rem; cursor:pointer;
    padding:8px 0 16px; display:block; font-family:'Baloo 2',cursive;
  }
  .story-read-card {
    border-radius:24px; padding:28px 24px 24px;
    box-shadow:0 6px 24px rgba(0,0,0,0.1); margin-bottom:20px;
  }
  .story-read-emoji { font-size:4rem; line-height:1; text-align:center; margin-bottom:12px; }
  .story-read-title {
    font-family:'Baloo 2',cursive; font-weight:900; font-size:1.8rem;
    text-align:center; margin:0 0 10px; line-height:1.1;
  }
  .story-focus-chip {
    display:inline-block; background:rgba(0,0,0,0.07);
    border-radius:99px; padding:4px 14px; font-size:0.78rem;
    font-weight:700; color:#666; margin:0 auto 20px; display:block;
    text-align:center; width:fit-content; margin:0 auto 20px;
  }
  .story-text-block {
    background:rgba(255,255,255,0.7); border-radius:16px;

// 7. SUCCESS GRADIENT: locked progression with adult override available

// ═══════════════════════════════════════════════════════

// ── UNLOCK LOGIC ──────────────────────────────────────
// Returns true if the given section is accessible for the active profile.
// Adults can set adultOverride to a section id to bypass auto-gating.
function isSectionUnlocked(id) {
  // Stories has its own unlock logic — checked independently of isPremium
  // so children get access to early stories as a reward for learning letters
  if (id === 'stories') {
    if (!settings.isPremium) {
      // Free users get the first 2 stories if they've done 6 letters
      return profiles.list[profiles.active].lettersDone.length >= 6;
    }
    return profiles.list[profiles.active].lettersDone.length >= 6;
  }
  if (!settings.isPremium) return id === 'letters';
  if (settings.adultOverride) {
    const order = ['letters','cvc','blends','digraphs','sight','readit','stories'];
    const overrideIdx = order.indexOf(settings.adultOverride);
    const thisIdx = order.indexOf(id);
    return thisIdx <= overrideIdx;
  }
  const p = profiles.list[profiles.active];
  if (id === 'letters')  return true;
  if (id === 'cvc')      return p.lettersDone.length  >= settings.gates.cvc;
  if (id === 'blends')   return p.cvcDone.length      >= settings.gates.blends;
  if (id === 'digraphs') return p.cvcDone.length      >= settings.gates.digraphs;
  if (id === 'sight')    return p.blendsDone.length   >= settings.gates.sight;
  if (id === 'readit')   return p.sightDone.length    >= settings.gates.readit;
  if (id === 'stories')  return p.lettersDone.length  >= 6; // unlocks after first 6 letters
  return false;
}

// ── BUILD SESSION ─────────────────────────────────────
function buildSession() {
  const profile = profiles.list[profiles.active];
  let pool = [];
  if (currentSection === 'letters') {
    pool = LETTERS.filter(l => !profile.lettersDone.includes(l.l));
    if (pool.length === 0) { showSectionComplete(); return; }
  } else if (currentSection === 'blends') {
    pool = BLENDS.filter(b => !profile.blendsDone.includes(b.blend+b.ex));
    if (pool.length === 0) { showSectionComplete(); return; }
  } else if (currentSection === 'digraphs') {
    pool = DIGRAPHS.filter(d => !profile.digraphsDone.includes(d.dg+d.ex));
    if (pool.length === 0) { showSectionComplete(); return; }
  } else if (currentSection === 'cvc') {
    pool = CVC_WORDS.filter(w => !profile.cvcDone.includes(w.word));
    if (pool.length === 0) { showSectionComplete(); return; }
  } else if (currentSection === 'sight') {
    pool = SIGHT_WORDS.filter(w => !profile.sightDone.includes(w.word));
    if (pool.length === 0) { showSectionComplete(); return; }
  } else if (currentSection === 'readit') {
    const cvcPool = CVC_WORDS.map(w => ({word: w.word, pic: w.pic, hint: null, type:'cvc'}));
    const sightPool = SIGHT_WORDS.map(w => ({word: w.word, pic: w.pic, hint: w.sentence, type:'sight'}));
    const combined = [...cvcPool, ...sightPool];
    pool = combined.filter(w => !profile.readitDone.includes(w.word));
    if (pool.length === 0) { showSectionComplete(); return; }
  }
  // Use however many unseen items remain, up to sessionSize — never recycle
  sessionItems = pool.sort(() => Math.random()-0.5).slice(0, settings.sessionSize);
  sessionIdx = 0; sessionCorrect = 0; sessionPhase = 'speak'; retryCount = 0;
  renderSession();
}

// ── SECTION NAV ───────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sectionNav');
  nav.innerHTML = SECTIONS.map(t => {
    const unlocked = isSectionUnlocked(t.id);
    const active = currentSection === t.id;
    const badge = t.free
      ? '<span class="free-lock">FREE</span>'
      : unlocked
        ? '<span class="free-lock" style="background:var(--forest-light)">✓</span>'
        : '<span class="premium-lock">🔒</span>';
    return `<button class="tab-btn ${active?'active':''} ${unlocked?'':'tab-locked'}"
      onclick="switchSection('${t.id}')">${t.label}${badge}</button>`;
  }).join('');
}

function switchSection(id) {
  if (!isSectionUnlocked(id)) {
    if (id === 'stories') {
      const done = profiles.list[profiles.active].lettersDone.length;
      alert(`📚 Complete ${6 - done} more letter${6-done===1?'':'s'} to unlock Cubby's Stories! (${done}/6 done)`);
      return;
    }
    if (!settings.isPremium) { showUpgrade(); return; }
    // Premium but gated — show what's needed
    const p = profiles.list[profiles.active];
    const msgs = {
      cvc:      `Complete ${settings.gates.cvc} letters first (${p.lettersDone.length}/${settings.gates.cvc} done)`,
      blends:   `Complete ${settings.gates.blends} CVC words first (${p.cvcDone.length}/${settings.gates.blends} done)`,
      digraphs: `Complete ${settings.gates.digraphs} CVC words first (${p.cvcDone.length}/${settings.gates.digraphs} done)`,
      sight:    `Complete ${settings.gates.sight} blends first (${p.blendsDone.length}/${settings.gates.sight} done)`,
      readit:   `Complete ${settings.gates.readit} sight words first (${p.sightDone.length}/${settings.gates.readit} done)`,
    };
    alert('🔒 ' + (msgs[id] || 'Keep practising to unlock this!') + '\n\nYou can also unlock it in the Teacher Panel.');
    return;
  }
  currentSection = id;
  sessionPhase = 'speak';
  buildNav();
  if (id === 'stories') { buildStoriesView(); return; }
  buildSession();
}

// ── RENDER SESSION ────────────────────────────────────
function renderSession() {
  if (currentSection === 'stories') { buildStoriesView(); return; }
  buildNav();
  updateProgress();
  const item = sessionItems[sessionIdx];
  if (!item) { buildSession(); return; } // guard: empty pool returns to buildSession
  const area = document.getElementById('appArea');
  if (currentSection === 'letters')       renderLetter(area, item);
  else if (currentSection === 'blends')   renderBlend(area, item);
  else if (currentSection === 'digraphs') renderDigraph(area, item);
  else if (currentSection === 'cvc')      renderCVC(area, item);
  else if (currentSection === 'sight')    renderSight(area, item);
  else if (currentSection === 'readit')   renderReadIt(area, item);
}

// ── SPEECH RECOGNITION SETUP ───────────────────────────
function initSpeech() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return null;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const r = new SR();
  r.continuous = false;
  r.interimResults = false;
  r.lang = 'en-US';
  return r;
}

function speak(text, rate=0.85, pitch=1.1) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  // iOS Safari fix: if paused (common after 14s inactivity), resume before speaking
  if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = pitch; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const nice = voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Daniel'));
  if(nice) u.voice = nice;
  window.speechSynthesis.speak(u);
}

// ── UPDATE PROGRESS ───────────────────────────────────
function updateProgress() {
  const total = sessionItems.length;
  const done = sessionIdx;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const plEl = document.getElementById('progressLabel');
  const ppEl = document.getElementById('progressPct');
  const pfEl = document.getElementById('progressFill');
  if (plEl) plEl.textContent = `${Math.min(done+1, total)} of ${total}`;
  if (ppEl) ppEl.textContent = pct + '%';
  if (pfEl) pfEl.style.width = pct + '%';
  // Session dot indicators — child can count how many left
  const dotsEl = document.getElementById('sessionDots');
  if (dotsEl && total > 0) {
    dotsEl.innerHTML = Array.from({length: total}, (_,i) =>
      `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 2px;
       background:${i < done ? 'var(--forest)' : i === done ? 'var(--honey)' : 'var(--forest-pale)'}"></span>`
    ).join('');
  }
}

// ── PHONEME MAP ───────────────────────────────────────
// Each value is the string fed to speechSynthesis to produce the pure
// phoneme sound — NOT the letter name. Principles:
//   • Continuants (s,f,m,n,l,r,v,z): repeated characters sustain the sound
//     without a schwa: 'ssss' stays /s/, 'mmmm' stays /m/
//   • Voiced stops (b,d,g): append a minimal 'uh' written as a single 'u'
//     because bare 'b' is often swallowed or read as the letter name by TTS
//   • Unvoiced stops (p,t,k,c): append 'uh' — same reason
//   • Short vowels: bare vowel letter works well at slow rate
//   • Special: w → 'wuh', h → 'huh', y → 'yuh', q → 'kwuh', x → 'ksss'
const PHONEME_MAP = {
  A: { tts: 'ah',    desc: '/a/ as in apple'   },  // short vowel — 'ah' not 'aaa'
  B: { tts: 'buh',   desc: '/b/ as in bear'     },
  C: { tts: 'kuh',   desc: '/k/ as in cat'      },
  D: { tts: 'duh',   desc: '/d/ as in duck'     },
  E: { tts: 'eh',    desc: '/e/ as in egg'      },  // short vowel — 'eh' not 'eee'
  F: { tts: 'fuh',   desc: '/f/ as in frog'     },
  G: { tts: 'guh',   desc: '/g/ as in grape'    },
  H: { tts: 'huh',   desc: '/h/ as in house'    },
  I: { tts: 'ih',    desc: '/i/ as in insect'   },  // short vowel — 'ih' not 'iii'
  J: { tts: 'juh',   desc: '/j/ as in joystick' },
  K: { tts: 'kuh',   desc: '/k/ as in kangaroo' },
  L: { tts: 'luh',   desc: '/l/ as in lion'     },
  M: { tts: 'muh',   desc: '/m/ as in moon'     },
  N: { tts: 'nuh',   desc: '/n/ as in nest'     },
  O: { tts: 'o',     desc: '/o/ as in octopus'  },  // short vowel — bare 'o' at slow rate, NOT 'oh' (long O)
  P: { tts: 'puh',   desc: '/p/ as in penguin'  },
  Q: { tts: 'kwuh',  desc: '/kw/ as in queen'   },
  R: { tts: 'ruh',   desc: '/r/ as in rainbow'  },
  S: { tts: 'suh',   desc: '/s/ as in snake'    },
  T: { tts: 'tuh',   desc: '/t/ as in turtle'   },
  U: { tts: 'uh',    desc: '/u/ as in umbrella' },  // short vowel — 'uh' not 'uuu'
  V: { tts: 'vuh',   desc: '/v/ as in volcano'  },
  W: { tts: 'wuh',   desc: '/w/ as in wave'     },
  X: { tts: 'ks',    desc: '/ks/ as in fox'     },  // two sounds, no schwa — X at end of word
  Y: { tts: 'yuh',   desc: '/y/ as in yo-yo'    },
  Z: { tts: 'zuh',   desc: '/z/ as in zebra'    },
};

function soundOf(l) {
  return (PHONEME_MAP[l.toUpperCase()] || { tts: l.toLowerCase() }).tts;
}

// Play the isolated phoneme for a letter.
// Structure: phoneme × 2 (slow, high pitch) → pause → example word × 2
// The double phoneme at very slow rate gives children time to hear and
// imitate the pure sound before the semantic anchor (word) plays.
function playLetterSound(l) {
  const ph = soundOf(l);
  // Pull example word from LETTERS array — guaranteed to match the picture on screen
  const letterData = LETTERS.find(x => x.l === l.toUpperCase());
  const exWord = letterData ? letterData.word.toLowerCase() : l.toLowerCase();

  window.speechSynthesis.cancel();

  // Utterance 1: phoneme once, slow and clear
  const u1 = new SpeechSynthesisUtterance(ph);
  u1.rate = 0.42; u1.pitch = 1.25; u1.volume = 1;

  // Utterance 2: example word once, natural pace
  const u2 = new SpeechSynthesisUtterance(exWord);
  u2.rate = 0.75; u2.pitch = 1.05; u2.volume = 1;

  const voices = window.speechSynthesis.getVoices();
  const nice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel'));
  if (nice) { u1.voice = nice; u2.voice = nice; }

  window.speechSynthesis.speak(u1);
  window.speechSynthesis.speak(u2);
}

// Play a single phoneme sound with no word — used during typing.
// Short, crisp, at moderate rate so it doesn't lag the typing rhythm.
function playPhoneme(l) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(soundOf(l));
  u.rate = 0.55; u.pitch = 1.2; u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const nice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel'));
  if (nice) u.voice = nice;
  window.speechSynthesis.speak(u);
}

// ── BLEND SECTION ─────────────────────────────────────
function renderBlend(area, item) {
  // BRAIN REASONING: Visual sliding animation mimics articulatory blend — two sounds
  // physically overlapping. Hear model first → attempt → feedback loop.
  // No typing for blends — working memory load would interfere with phonological focus.
  area.innerHTML = `
    <div class="card">
      ${cubbyHTML(rnd(CUBBY_GREET_BLENDS))}
      <div class="stars-row" id="starsRow">${'<span class="star" id="star0">⭐</span><span class="star" id="star1">⭐</span><span class="star" id="star2">⭐</span>'}</div>

      <div class="blend-display" id="blendDisp" onclick="playBlendSound('${item.blend}','${item.ex}')">
        <div class="blend-letter">${item.blend[0]}</div>
        <div class="blend-letter">${item.blend[1]}</div>
      </div>

      <div class="picture-card" style="margin:0 auto;max-width:200px;">
        <div class="picture-emoji">${item.pic}</div>
        <div class="picture-word">${item.ex}</div>
      </div>

      ${tapAnswerHTML(item.ex.toLowerCase(),'blend')}
      <div class="feedback-msg" id="feedbackMsg"></div>

      <div class="nav-controls">
        <button class="btn-nav btn-prev" onclick="prevItem()" ${sessionIdx===0?'style="visibility:hidden"':''}>← Back</button>
        <button class="btn-nav btn-next" id="nextBtn" onclick="nextItem()" disabled>Next →</button>
      </div>
    </div>`;

  setTimeout(()=>{
    document.getElementById('blendDisp').classList.add('slide');
    playBlendSound(item.blend, item.ex);
  },500);
}

function playBlendSound(blend, ex) {
  // Sequence: sound1 → sound2 → blend together → example word
  // The two separate phonemes help children hear each component,
  // then the full blend shows how they slide together.
  const s1 = soundOf(blend[0]);
  const s2 = soundOf(blend[1]);

  window.speechSynthesis.cancel();
  const voices = window.speechSynthesis.getVoices();
  const nice = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel'));

  // u1: each sound separately, slow
  const u1 = new SpeechSynthesisUtterance(s1 + '. ' + s2);
  u1.rate = 0.5; u1.pitch = 1.15; u1.volume = 1;
  if (nice) u1.voice = nice;

  // u2: the full blend said naturally, then the example word once
  const u2 = new SpeechSynthesisUtterance(blend.toLowerCase() + '. ' + ex);
  u2.rate = 0.72; u2.pitch = 1.05; u2.volume = 1;
  if (nice) u2.voice = nice;

  window.speechSynthesis.speak(u1);
  window.speechSynthesis.speak(u2);
}

// ── CVC SECTION ───────────────────────────────────────
function renderCVC(area, item) {
  // BRAIN REASONING: Letters revealed one-by-one = segmentation support.
  // Speak first (phonological), then type (orthographic) = dual-route encoding.
  // Wrong answers show letter colours differently to give positional feedback.
  const isTypePhase = sessionPhase === 'type' && settings.typingOn;
  const greet = isTypePhase ? rnd(CUBBY_TYPE_CVC) : rnd(CUBBY_GREET_CVC);

  const letters = item.word.split('');
  const classes = ['c1','v1','c3'];
  const letterBoxes = letters.map((l,i)=>`<div class="cvc-letter ${classes[i]}" id="cvcL${i}">${l}</div>`).join('');

  area.innerHTML = `
    <div class="card">
      ${cubbyHTML(greet)}
      <div class="stars-row" id="starsRow">${'<span class="star" id="star0">⭐</span><span class="star" id="star1">⭐</span><span class="star" id="star2">⭐</span>'}</div>

      <div class="picture-card" style="margin:0 auto;max-width:220px;margin-bottom:12px;">
        <div class="picture-emoji" style="font-size:4rem">${item.pic}</div>
      </div>

      <div class="cvc-display">${letterBoxes}</div>

      ${isTypePhase ? cvcTypingHTML(item) : tapAnswerHTML(item.word.toLowerCase(),'cvc')}
      <div class="feedback-msg" id="feedbackMsg"></div>

      <div class="nav-controls">
        <button class="btn-nav btn-prev" onclick="prevItem()" ${sessionIdx===0&&!isTypePhase?'style="visibility:hidden"':''}>← Back</button>
        <button class="btn-nav btn-next" id="nextBtn" onclick="nextItem()" disabled>Next →</button>
      </div>
    </div>`;

  if (!isTypePhase) {
    setTimeout(()=>{
      revealCVCLetters(item);
      speak(item.word.toLowerCase(), 0.65, 1.05);
    }, 500);
  } else {
    setupTyping(item.word, item.word.length);
  }
}

function revealCVCLetters(item) {
  item.word.split('').forEach((l,i)=>{
    setTimeout(()=>{
      const el = document.getElementById('cvcL'+i);
      if(el) el.classList.add('reveal');
    }, i*300);
  });
}

function cvcTypingHTML(item) {
  const boxes = item.word.split('').map((_,i) =>
    `<div class="type-box" id="typeBox${i}"></div>`
  ).join('');

  const dots = item.sounds.map((s, i) => `
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="blend-dot" id="blendDot${i}"

        onmouseenter="onDotDrag(${i})"
        ontouchmove="onDotDrag(${i})">
      </div>
      <div class="blend-label" id="blendLabel${i}">·</div>
    </div>`
  ).join('');

  return `
    <div class="keyboard-section">
      <h4>Can you spell it? Tap the letters! 🐾</h4>

}

// ── DIGRAPH SECTION ───────────────────────────────────
// BRAIN REASONING: Digraphs are two letters making ONE sound — a conceptual leap.
// The digraph-card-wrapper visually fuses the two letters into one unit with a
// bracket bar beneath, making it impossible for a child to see them as separate.
// Tapping anywhere on the block plays the unified phoneme — never one letter at a time.

// Phoneme labels shown under the digraph bar — child-friendly sound descriptions
const DIGRAPH_PHONEME_LABEL = {
  SH: 'shhh 🤫', CH: 'ch ch ✋', TH: 'th 👅',
  WH: 'wh 💨',   PH: 'fff 🌬️',  NG: 'ng 🔔',
};

function digraphCardHTML(dg, { onclick = '', size = 'large' } = {}) {
  const label = DIGRAPH_PHONEME_LABEL[dg.toUpperCase()] || dg;
  const sizeClass = size === 'small' ? ' small' : '';
  const clickAttr = onclick ? `onclick="${onclick}"` : '';
  return `
    <div class="digraph-card-wrapper${sizeClass}" ${clickAttr}>

        <span>${dg[0].toUpperCase()}</span><span>${dg[1].toUpperCase()}</span>
      </div>
      <div class="digraph-bar"></div>
      <div class="digraph-label">${label}</div>
    </div>`;
}

function renderDigraph(area, item) {

function playDigraphSound(dg, ex) {
  // TTS-friendly digraph sounds — tested for Chrome TTS clarity
  const sounds = {SH:'sh', CH:'ch', TH:'th', WH:'wh', PH:'ff', NG:'ng'};
  const s = sounds[dg] || dg.toLowerCase();

// ── SIGHT WORD SECTION ────────────────────────────────
// BRAIN REASONING: Sight words need whole-word visual memory, not phonics decoding.
// We show the word large, read it + a sentence for context, then use tap-only response.
// No mic attempt — these words often can't be phonetically sounded out accurately.
// The example sentence gives semantic context which boosts memory encoding.
function renderSight(area, item) {

        <div style="margin-top:10px;font-size:1.05rem;color:#888;font-style:italic;">"${item.sentence}"</div>
        <div style="font-size:0.78rem;color:#BBB;margin-top:6px;">Tap the word to hear it again</div>

        <div class="tap-choices">${tapBtns}</div>

}

function playSightWord(word, sentence) {

function keyboardHTML() {

// ── READ IT! SECTION ──────────────────────────────────

function skipReadIt() {

  markItemDone();

function showNoMicMsg() {

}

// ── TYPING LOGIC ──────────────────────────────────────
let typingTarget = '';
let typingLen = 1;

function setupTyping(target, len) {
  typingTarget = target;
  typingLen = len;
  typedSoFar = '';
  // Highlight the first key
  setTimeout(()=>{
    const k = document.getElementById('key'+target[0].toUpperCase());
    if(k) k.classList.add('key-highlight');
  }, 300);
}

function typeLetter(l) {
  if (typedSoFar.length >= typingLen) return;
  const idx = typedSoFar.length;
  const expectedChar = typingTarget[idx].toUpperCase();
  const box = document.getElementById('typeBox' + idx);

  // Remove highlight from typed key
  const prevKey = document.getElementById('key' + expectedChar);
  if(prevKey) prevKey.classList.remove('key-highlight');

  if (l === expectedChar) {
    typedSoFar += l;
    if(box) { box.textContent = l; box.classList.add('filled','correct-box'); }
    // Light the corresponding Elkonin dot and reveal its letter
    const dot = document.getElementById('blendDot' + idx);
    if(dot) dot.classList.add('lit');
    const label = document.getElementById('blendLabel' + idx);
    if(label) label.textContent = l;
    playPhoneme(l);

    if (typedSoFar.length === typingLen) {
      setTimeout(()=> onTypingComplete(true), 400);
    } else {
      const nextKey = document.getElementById('key'+typingTarget[typedSoFar.length].toUpperCase());
      if(nextKey) nextKey.classList.add('key-highlight');
    }
  } else {
    if(box) { box.classList.add('wrong-box'); setTimeout(()=>box.classList.remove('wrong-box'),500); }
  }
}

function typeBack() {
  if (typedSoFar.length === 0) return;
  typedSoFar = typedSoFar.slice(0,-1);
  const box = document.getElementById('typeBox'+typedSoFar.length);
  if(box) { box.textContent=''; box.classList.remove('filled','correct-box','wrong-box'); }
  // Un-light dot and hide label
  const dot = document.getElementById('blendDot' + typedSoFar.length);
  if(dot) dot.classList.remove('lit');
  const label = document.getElementById('blendLabel' + typedSoFar.length);
  if(label) label.textContent = '·';
  const nextKey = document.getElementById('key'+typingTarget[typedSoFar.length].toUpperCase());
  if(nextKey) nextKey.classList.add('key-highlight');
}

// ── ELKONIN DRAG BLEND ────────────────────────────────
// When child drags across dots, each dot pulses and its phoneme plays.
// On release, the full blended word is spoken.
let blendDragActive = false;
let lastDragIdx = -1;
let currentBlendWord = '';

function onDotDrag(idx) {
  if (!blendDragActive) return; // only fire during active drag/press
  if (idx === lastDragIdx) return; // don't repeat same dot
  lastDragIdx = idx;
  const dot = document.getElementById('blendDot' + idx);
  if (!dot) return;
  // Visual pulse
  dot.classList.add('drag-active');
  setTimeout(()=> dot.classList.remove('drag-active'), 350);
  // Play the phoneme for this position
  if (currentBlendWord[idx]) playPhoneme(currentBlendWord[idx]);
}

function onBlendTrackLeave() {
  if (!blendDragActive) return;
  blendDragActive = false;
  lastDragIdx = -1;
  // Speak the full blended word after a short pause
  if (currentBlendWord) {
    setTimeout(()=> speak(currentBlendWord.toLowerCase(), 0.65, 1.1), 300);
  }
}

function startBlendDrag(word) {
  blendDragActive = true;
  lastDragIdx = -1;
  currentBlendWord = word;
}

function onTypingComplete(success) {
  if(success) {
    earnStar(2);
    setFeedback(rnd(CUBBY_CORRECT), true);
    triggerCelebration();
    markItemDone();
    const nb = document.getElementById('nextBtn');
    if (nb) nb.disabled = false;
  }
}

// ── MIC SUPPORT DETECTION ─────────────────────────────
function hasSpeechSupport() {
  return ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window);
}

// ── MIC HTML ──────────────────────────────────────────
// Always show BOTH mic button AND tap choices.
// Mic works where supported; tap choices work everywhere as backup.
function micHTML(target, type) {
  const micActive = hasSpeechSupport();
  return `
    <div class="mic-section">
      <button class="mic-btn" id="micBtn" onclick="${micActive ? 'startListening()' : ''}"
        style="${micActive ? '' : 'opacity:0.35;cursor:not-allowed'}">🎤</button>
      <div class="wave-bars" id="waveBars">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div style="font-size:0.85rem;color:#AAA;font-weight:700;margin-bottom:6px;">
        ${micActive ? 'Tap 🎤 to speak — or tap an answer!' : 'Tap the right answer!'}
      </div>
    </div>
    ${tapAnswerHTML(target, type)}`;
}

// ── TAP-TO-ANSWER FALLBACK ────────────────────────────
// BRAIN REASONING: On iOS where mic is unavailable, we show 3 choices.
// Recognition/recall with visual options still activates phoneme-grapheme mapping.
// Wrong options are phonetically plausible distractors — not random — so children
// must actually discriminate sounds, not just guess by elimination.
function tapAnswerHTML(target, type) {
  const choices = generateChoices(target, type);

  // For digraphs: render each choice as a unified digraph card, not a plain button
  const btns = type === 'digraph'
    ? choices.map(c => `
        <div onclick="tapAnswer('${c}','${target}','${type}')" style="display:inline-block;">
          ${digraphCardHTML(c.toUpperCase(), { size: 'small' })}
        </div>`).join('')
    : choices.map(c => `
        <button class="tap-choice" onclick="tapAnswer('${c}','${target}','${type}')">${c.toUpperCase()}</button>
      `).join('');

  return `
    <div class="tap-answer-section">
      <div style="font-size:0.9rem;font-weight:700;color:#AAA;margin-bottom:12px;text-align:center;">
        Tap the right answer!
      </div>
      <div class="tap-choices" style="${type==='digraph'?'gap:20px;':''}">
        ${btns}
      </div>
    </div>`;
}

function generateChoices(target, type) {
  let pool = [];
  if (type === 'letter') {
    // IMPORTANT: Never pair b/d/p together — they are the most commonly reversed
    // letters for young readers. Showing all three simultaneously causes confusion.
    const confusables = {
      s:'z,f',  a:'e,o',  t:'d,f',  p:'m,s',  i:'e,l',  n:'m,h',
      m:'n,w',  d:'g,f',  g:'c,o',  o:'a,u',  c:'k,s',  k:'c,x',
      e:'i,a',  u:'o,a',  r:'n,h',  h:'n,r',  b:'s,f',  f:'v,t',
      l:'i,j',  j:'g,y',  v:'w,u',  w:'m,v',  x:'z,k',  y:'j,v',
      z:'s,x',  q:'c,g',
    };
    const alts = (confusables[target] || 'a,b').split(',');
    pool = [target, alts[0], alts[1]];
  } else if (type === 'blend') {
    // Show full example words, not abstract blend letters (BL/BR/CR)
    // Children recognise 'blue' more readily than 'BL'
    const all = BLENDS.map(b => b.ex.toLowerCase());
    const others = all.filter(b => b !== target && !target.startsWith(b.slice(0,2)))
      .sort(() => Math.random()-0.5).slice(0,2);
    while (others.length < 2) others.push(all.find(b => b !== target && !others.includes(b)) || 'blue');
    pool = [target, ...others];
  } else if (type === 'digraph') {
    const all = [...new Set(DIGRAPHS.map(d => d.dg.toLowerCase()))];
    const others = all.filter(d => d !== target).sort(() => Math.random()-0.5).slice(0,2);
    while (others.length < 2) others.push(all.find(d => d !== target && !others.includes(d)) || 'sh');
    pool = [target, ...others];
  } else if (type === 'cvc') {
    const all = CVC_WORDS.map(w => w.word.toLowerCase());
    // Prefer distractors that share the vowel or ending — harder but more educational
    const vowel = target[1];
    const ending = target.slice(1);
    const sameVowel = all.filter(w => w !== target && w[1] === vowel);
    const sameEnding = all.filter(w => w !== target && w.slice(1) === ending);
    // Pick 1 same-ending + 1 same-vowel if possible, else random
    const d1 = sameEnding.length ? sameEnding[Math.floor(Math.random()*sameEnding.length)] : null;
    const d2pool = sameVowel.filter(w => w !== d1);
    const d2 = d2pool.length ? d2pool[Math.floor(Math.random()*d2pool.length)] : null;
    const fallback = all.filter(w => w !== target && w !== d1 && w !== d2);
    const others = [
      d1 || fallback[Math.floor(Math.random()*fallback.length)],
      d2 || fallback[Math.floor(Math.random()*fallback.length) + 1] || 'cat',
    ].filter(Boolean).slice(0,2);
    pool = [target, ...others];
  } else if (type === 'sight' || type === 'readit') {
    const sightAll = SIGHT_WORDS.map(w => w.word.toLowerCase());
    const cvcAll   = CVC_WORDS.map(w => w.word.toLowerCase());
    const all = type === 'readit' ? [...sightAll, ...cvcAll] : sightAll;
    const others = all.filter(w => w !== target).sort(() => Math.random()-0.5).slice(0,2);
    while (others.length < 2) others.push(all.find(w => w !== target && !others.includes(w)) || 'the');
    pool = [target, ...others];
  }
  return pool.sort(() => Math.random()-0.5);
}

function tapAnswer(chosen, target, type) {
  checkAnswer(chosen, target, type);
}

// ── SPEECH RECOGNITION ────────────────────────────────
let micPermissionDenied = false;
let currentRecognition = null; // separate from global to avoid stale ref issues

function setupMic(target, type) {
  if (!hasSpeechSupport() || micPermissionDenied) return;

  // Abort any in-progress recognition cleanly
  if (currentRecognition) {
    try { currentRecognition.abort(); } catch(e) {}
    currentRecognition = null;
  }
  recognition = initSpeech();
  if (!recognition) return;
  currentRecognition = recognition;
  recognition.maxAlternatives = 5; // check up to 5 guesses, not just 1

  const thisRecognition = recognition; // capture for closure — prevents stale ref

  recognition.onresult = (e) => {
    if (thisRecognition !== currentRecognition) return; // stale, ignore
    updateMicUI(false);

    // Collect all alternatives
    const transcripts = [];
    for (let i = 0; i < e.results[0].length; i++) {
      transcripts.push(e.results[0][i].transcript.trim().toLowerCase());
    }

    // Show what was heard (helps with testing + child knows it worked)
    const heard = document.getElementById('micHeard');
    if (heard) {
      heard.textContent = '🎤 I heard: "' + transcripts[0] + '"';
      heard.style.display = 'block';
    }

    // Find the best-matching transcript (dryRun = test only)
    let bestMatch = null;
    for (const said of transcripts) {
      if (checkAnswer(said, target, type, true)) { bestMatch = said; break; }
    }

    // Commit exactly once — use the matched transcript if found, otherwise the top result
    checkAnswer(bestMatch !== null ? bestMatch : transcripts[0], target, type, false);
  };

  recognition.onerror = (e) => {
    if (thisRecognition !== currentRecognition) return;
    updateMicUI(false);
    if (e.error === 'not-allowed') {
      micPermissionDenied = true;
      currentRecognition = null;
      const btn = document.getElementById('micBtn');
      if (btn) { btn.style.opacity = '0.25'; btn.style.cursor = 'not-allowed'; btn.onclick = null; }
      const fallback = document.getElementById('readitTapFallback');
      if (fallback) fallback.style.display = 'block';
      setFeedback('🎤 Mic blocked — tap an answer below, or click 🔒 in the browser bar to allow the mic.', false);
    } else if (e.error === 'no-speech') {
      setFeedback("Cubby didn't hear anything — tap 🎤 and try again!", false);
    } else {
      setFeedback("Couldn't hear that — try again or tap an answer below.", false);
    }
  };

  recognition.onend = () => {
    if (thisRecognition !== currentRecognition) return; // stale, ignore
    updateMicUI(false);
  };
}

function updateMicUI(listening) {
  const btn = document.getElementById('micBtn');
  const waves = document.getElementById('waveBars');
  if (btn) btn.classList.toggle('listening', listening);
  if (waves) waves.classList.toggle('active', listening);
}

function startListening() {
  if (!recognition || micPermissionDenied) return;
  updateMicUI(true);
  try { recognition.start(); } catch(e) {
    updateMicUI(false);
    setFeedback("Mic error — try tapping again.", false);
  }
}

function stopListening() {
  updateMicUI(false);
  // Don't call recognition.stop() here — let it end naturally or via abort in setupMic
}

// ── ANSWER CHECKING ───────────────────────────────────
function checkAnswer(said, target, type, dryRun = false) {
  // Keep spaces for word-boundary matching; strip everything else
  const clean = said.replace(/[^a-z ]/g,'').trim();
  const words = clean.split(/\s+/);
  const noSpace = clean.replace(/\s/g,'');
  let correct = false;

  if (type === 'letter') {
    // Child may say the sound, the example word, or anything starting with the sound
    correct = noSpace === target || noSpace.startsWith(target) ||
              noSpace === soundOf(target.toUpperCase()).replace(/[^a-z]/g,'');
  } else if (type === 'blend' || type === 'digraph') {
    // target is now the full example word (e.g. 'blue' for BL blend)
    // Accept exact word match (tap) or any word starting with the same 2-letter blend
    const blendPrefix = target.slice(0,2);
    correct = words.includes(target) || clean === target || noSpace.startsWith(blendPrefix);
  } else if (type === 'cvc' || type === 'sight' || type === 'readit') {
    // Must be an actual word match — no substring matching to avoid 'scatter' matching 'cat'
    correct = words.includes(target) || clean === target;
  }

  if (dryRun) return correct;

  profiles.list[profiles.active].total++;

  if (correct) {
    profiles.list[profiles.active].correct++;
    sessionCorrect++;
    const starIdx = retryCount === 0 ? 0 : retryCount === 1 ? 1 : 2;
    retryCount = 0;
    earnStar(starIdx);
    setFeedback(rnd(CUBBY_CORRECT), true);
    triggerCelebration();

    const noTyping = ['blends','digraphs','sight','readit'];
    if (settings.typingOn && sessionPhase === 'speak' && !noTyping.includes(currentSection)) {
      setTimeout(()=>{ sessionPhase = 'type'; renderSession(); }, 1800);
    } else {
      markItemDone();
      const _nb = document.getElementById('nextBtn'); if(_nb) _nb.disabled = false;
    }
  } else {
    retryCount++;
    if (retryCount >= 3) {
      setFeedback("Let's hear it together! 🐾 " + target.toUpperCase(), false);
      // Speak the answer so child hears it, not just reads it
      setTimeout(()=> speak(target, 0.65, 1.1), 300);
      markItemDone();
      const _nb = document.getElementById('nextBtn'); if(_nb) _nb.disabled = false;
      retryCount = 0;
    } else {
      setFeedback(rnd(CUBBY_TRY), false);
      // Replay the target sound after a short pause so child hears it again
      setTimeout(() => {
        if (currentSection === 'letters') playLetterSound(target.toUpperCase());
        else if (currentSection === 'cvc') speak(target, 0.65, 1.1);
        else if (currentSection === 'sight') speak(target, 0.7, 1.05);
        else if (currentSection === 'blends') {
          const b = BLENDS.find(x => x.ex.toLowerCase() === target);
          if (b) playBlendSound(b.blend, b.ex);
        } else if (currentSection === 'digraphs') {
          const d = DIGRAPHS.find(x => x.dg.toLowerCase() === target || x.ex.toLowerCase() === target);
          if (d) playDigraphSound(d.dg, d.ex);
        }
      }, 600);
    }
  }
  return correct;
}

function markItemDone() {
  const item = sessionItems[sessionIdx];
  const profile = profiles.list[profiles.active];
  if (currentSection === 'letters'  && !profile.lettersDone.includes(item.l))           profile.lettersDone.push(item.l);
  if (currentSection === 'blends'   && !profile.blendsDone.includes(item.blend+item.ex)) profile.blendsDone.push(item.blend+item.ex);
  if (currentSection === 'digraphs' && !profile.digraphsDone.includes(item.dg+item.ex))  profile.digraphsDone.push(item.dg+item.ex);
  if (currentSection === 'cvc'      && !profile.cvcDone.includes(item.word))             profile.cvcDone.push(item.word);
  if (currentSection === 'sight'    && !profile.sightDone.includes(item.word))           profile.sightDone.push(item.word);
  if (currentSection === 'readit'   && !profile.readitDone.includes(item.word))          profile.readitDone.push(item.word);
}

// ── NAVIGATION ────────────────────────────────────────
function nextItem() {
  blendDragActive = false; currentBlendWord = ''; // FIX: reset drag state between items
  sessionIdx++;
  sessionPhase = 'speak';
  retryCount = 0;
  typedSoFar = '';
  if (sessionIdx >= sessionItems.length) { showComplete(); return; }
  renderSession();
}

function prevItem() {
  blendDragActive = false; currentBlendWord = ''; // FIX: reset drag state between items
  if (sessionIdx === 0 && sessionPhase === 'speak') return;
  if (sessionPhase === 'type') {
    // Going back to speak phase of same item — re-enable Next since speak was already passed
    sessionPhase = 'speak';
    retryCount = 0;
    renderSession();
    // Item was already answered correctly to reach type phase, so Next should still work
    const btn = document.getElementById('nextBtn');
    if (btn) btn.disabled = false;
    return;
  }
  sessionIdx = Math.max(0, sessionIdx - 1);
  sessionPhase = 'speak';
  retryCount = 0;
  renderSession();
}

// ── COMPLETE SCREEN ───────────────────────────────────
function showComplete() {
  const profile = profiles.list[profiles.active];
  profile.sessions++;
  const area = document.getElementById('appArea');
  updateProgress();
  // Check if any unseen items remain in this section for "Go Again"
  const remaining = getRemainingCount();
  area.innerHTML = `
    <div class="card">
      <div class="complete-screen">
        <div class="complete-bear">🐻</div>
        <h2>Great Session, ${profile.name}!</h2>
        <p>Cubby is so proud of you! 🎉</p>
        <div class="score-badge">${sessionCorrect}/${sessionItems.length}</div>
        <p style="margin-bottom:28px">You're becoming an amazing reader!</p>
        ${remaining > 0
          ? `<button class="btn-nav btn-next" style="margin:0 auto 12px;display:block" onclick="buildSession()">▶ Keep Going (${remaining} left)</button>`
          : `<button class="btn-nav btn-next" style="margin:0 auto 12px;display:block;background:var(--honey);color:var(--bark)" onclick="showSectionComplete()">🏆 Section Complete!</button>`
        }
      </div>
    </div>`;
  triggerCelebration();
}

function showSectionComplete() {
  const profile = profiles.list[profiles.active];
  const sectionLabels = {letters:'Letters',cvc:'CVC Words',blends:'Blends',digraphs:'Digraphs',sight:'Sight Words',readit:'Read It!'};
  const label = sectionLabels[currentSection] || currentSection;
  const area = document.getElementById('appArea');
  updateProgress();
  area.innerHTML = `
    <div class="card">
      <div class="complete-screen">
        <div class="complete-bear">🏆</div>
        <h2>You finished ${label}!</h2>
        <p style="font-size:1.3rem">Amazing work, ${profile.name}! 🎉</p>
        <p style="margin-bottom:28px">Cubby is super proud — you did every single one!</p>
        <button class="btn-nav btn-next" style="margin:0 auto 12px;display:block" onclick="buildSession()">🔄 Practise Again</button>
      </div>
    </div>`;
  triggerCelebration();
  // Reset done list so the section can be practised again
  const profile2 = profiles.list[profiles.active];
  if (currentSection === 'letters')  profile2.lettersDone  = [];
  if (currentSection === 'cvc')      profile2.cvcDone      = [];
  if (currentSection === 'blends')   profile2.blendsDone   = [];
  if (currentSection === 'digraphs') profile2.digraphsDone = [];
  if (currentSection === 'sight')    profile2.sightDone    = [];
  if (currentSection === 'readit')   profile2.readitDone   = [];
}

function getRemainingCount() {
  const p = profiles.list[profiles.active];
  if (currentSection === 'letters')  return LETTERS.filter(l => !p.lettersDone.includes(l.l)).length;
  if (currentSection === 'cvc')      return CVC_WORDS.filter(w => !p.cvcDone.includes(w.word)).length;
  if (currentSection === 'blends')   return BLENDS.filter(b => !p.blendsDone.includes(b.blend+b.ex)).length;
  if (currentSection === 'digraphs') return DIGRAPHS.filter(d => !p.digraphsDone.includes(d.dg+d.ex)).length;
  if (currentSection === 'sight')    return SIGHT_WORDS.filter(w => !p.sightDone.includes(w.word)).length;
  if (currentSection === 'readit') {
    const all = [...CVC_WORDS.map(w=>w.word), ...SIGHT_WORDS.map(w=>w.word)];
    return all.filter(w => !p.readitDone.includes(w)).length;
  }
  return 0;
}

// ── FEEDBACK & STARS ──────────────────────────────────
function setFeedback(msg, correct) {
  const el = document.getElementById('feedbackMsg');
  if(!el) return;
  el.textContent = msg;
  el.className = 'feedback-msg '+(correct?'correct':'try-again');
}

function earnStar(idx) {
  // idx 0 = correct first try (lights star 0)
  // idx 1 = correct second try (lights star 1, not 0)
  // idx 2 = typing complete (lights star 2 only — speak phase stars already set)
  if (idx === 2) {
    // Typing star: only light star 2
    const s = document.getElementById('star2');
    if (s && !s.classList.contains('earned')) s.classList.add('earned');
  } else {
    // Speak phase: light all stars up to and including idx
    for (let i = 0; i <= idx; i++) {
      const s = document.getElementById('star' + i);
      if (s && !s.classList.contains('earned')) s.classList.add('earned');
    }
  }
}

// ── CELEBRATION CONFETTI ──────────────────────────────
function triggerCelebration() {
  const el = document.getElementById('celebration');
  el.innerHTML = '';
  el.classList.add('show');
  const colors=['#F5A623','#52B788','#FF6B6B','#9B79D1','#4AACDA','#FFD07A'];
  for(let i=0;i<42;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.5)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.appendChild(c);
  }
  setTimeout(()=>el.classList.remove('show'), 3000);
}

      <div class="setting-row">
        <div><div class="setting-label">🔓 Unlock all sections</div><div class="setting-sub">Give access to all 5 sections</div></div>
        <button class="toggle ${settings.isPremium?'on':''}" onclick="togglePremium(this)"></button>
      </div>

      <div class="setting-row" ${!settings.isPremium?'style="opacity:0.4;pointer-events:none"':''}>
        <div>
          <div class="setting-label">🎚️ Section access override</div>
          <div class="setting-sub">Force-unlock up to a specific section regardless of progress gates</div>
        </div>
        <select style="padding:8px 12px;border-radius:12px;border:2px solid var(--forest-pale);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;color:var(--forest);background:white;cursor:pointer;"
          onchange="settings.adultOverride=this.value==='auto'?null:this.value">
          <option value="auto" ${!settings.adultOverride?'selected':''}>Auto (use progress gates)</option>
          ${overrideOptions}
        </select>
      </div>

      <div style="background:var(--forest-pale);border-radius:12px;padding:12px 16px;margin:12px 0;">
        <div style="font-weight:800;color:var(--forest);font-size:0.88rem;margin-bottom:8px;">🔒 Progress gates (items needed to unlock)</div>
        <div class="report-row">
          <span>CVC Words unlock after _ letters</span>
          <input type="number" min="1" max="26" value="${settings.gates.cvc}"
            style="width:52px;padding:4px 8px;border:2px solid var(--forest-pale);border-radius:8px;font-weight:800;font-family:'Baloo 2',cursive;font-size:1rem;text-align:center;"
            onchange="settings.gates.cvc=+this.value">
        </div>
        <div class="report-row">
          <span>Blends unlock after _ CVC words</span>
          <input type="number" min="1" max="46" value="${settings.gates.blends}"
            style="width:52px;padding:4px 8px;border:2px solid var(--forest-pale);border-radius:8px;font-weight:800;font-family:'Baloo 2',cursive;font-size:1rem;text-align:center;"
            onchange="settings.gates.blends=+this.value">
        </div>
        <div class="report-row">
          <span>Digraphs unlock after _ CVC words</span>
          <input type="number" min="1" max="46" value="${settings.gates.digraphs}"
            style="width:52px;padding:4px 8px;border:2px solid var(--forest-pale);border-radius:8px;font-weight:800;font-family:'Baloo 2',cursive;font-size:1rem;text-align:center;"
            onchange="settings.gates.digraphs=+this.value">
        </div>
        <div class="report-row">
          <span>Sight Words unlock after _ blends</span>
          <input type="number" min="1" max="22" value="${settings.gates.sight}"
            style="width:52px;padding:4px 8px;border:2px solid var(--forest-pale);border-radius:8px;font-weight:800;font-family:'Baloo 2',cursive;font-size:1rem;text-align:center;"
            onchange="settings.gates.sight=+this.value">
        </div>
        <div class="report-row">
          <span>Read It! unlocks after _ sight words</span>
          <input type="number" min="1" max="48" value="${settings.gates.readit}"
            style="width:52px;padding:4px 8px;border:2px solid var(--forest-pale);border-radius:8px;font-weight:800;font-family:'Baloo 2',cursive;font-size:1rem;text-align:center;"
            onchange="settings.gates.readit=+this.value">
        </div>
      </div>

      <div class="setting-row">
        <div><div class="setting-label">🔒 Change PIN</div></div>
        <button class="btn-sm btn-honey" style="padding:8px 18px;border-radius:50px;border:none;cursor:pointer;font-weight:700" onclick="changePin()">Change</button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">🔄 Reset ${p.name}'s progress</div></div>
        <button class="btn-sm" style="background:#FFE5E5;color:var(--red-soft);border:none;padding:8px 16px;border-radius:50px;font-weight:700;cursor:pointer" onclick="resetProfile()">Reset</button>
      </div>
    </div>

    <button class="panel-close" onclick="closePanel()">✓ Save & Close</button>`;
}

function togglePremium(btn) {
  settings.isPremium = !settings.isPremium;
  btn.classList.toggle('on', settings.isPremium);
  renderPanelSettings();
}

function switchProfile(i) {
  profiles.active = i;
  renderPanelSettings();
}

function toggleSetting(key, btn) {
  settings[key] = !settings[key];
  btn.classList.toggle('on', settings[key]);
}

function resetProfile() {
  if(!confirm('Reset progress for '+profiles.list[profiles.active].name+'?')) return;
  const p = profiles.list[profiles.active];
  p.lettersDone=[]; p.blendsDone=[]; p.digraphsDone=[]; p.cvcDone=[]; p.sightDone=[]; p.readitDone=[]; p.storiesDone=[];
  p.sessions=0; p.correct=0; p.total=0;
  renderPanelSettings();
}

function changePin() {
  const np = prompt('Enter new 4-digit PIN:');
  if(np && /^\d{4}$/.test(np)) { settings.pin = np; alert('PIN updated!'); }
  else if(np) alert('PIN must be exactly 4 digits.');
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  buildSession();
}

// ── UPGRADE MODAL ─────────────────────────────────────
function showUpgrade() {
  const area = document.getElementById('appArea');
  const existing = document.getElementById('upgradeModal');
  if(existing) { existing.remove(); return; }
  const div = document.createElement('div');
  div.id = 'upgradeModal';
  div.innerHTML = `
    <div class="upgrade-banner">
      <h3>🐻 Unlock All of Cubby Reads!</h3>
      <p>Get Blends, CVC Words, progress tracking, and 5 child profiles with Cubby Pro.</p>
      <button class="btn-upgrade" onclick="simulatePremium()">⭐ Try Cubby Pro — Coming Soon!</button>
      <p style="font-size:0.8rem;opacity:0.6;margin-top:12px">Free tier includes all 26 letters. No ads. Ever.</p>
    </div>`;
  area.prepend(div);
}

function simulatePremium() {
  settings.isPremium = true;
  const m = document.getElementById('upgradeModal');
  if(m) m.remove();
  alert('✨ Premium unlocked! (Demo mode)');
  buildNav();
}


// ══════════════════════════════════════════════════════════
// ── TAB 5: CUBBY'S MINI-BOOKS (DECODABLE STORIES) ────────
// ══════════════════════════════════════════════════════════

const DECODABLE_STORIES = [
  {id:'story_01',title:"Nip the Cat",emoji:'🐱',theme:'linear-gradient(135deg,#FFF9F0,#FDECD3)',accentColor:'#F5A623',text:"Nip is a cat.\nNip sat.\nNip sat on a mat.\nNip sat in the sun.\nNip is a tan cat.",wordFocus:'Letters: S A T N I',unlockReq:'letters',unlockCount:6},
  {id:'story_02',title:"Tip and Pin",emoji:'📌',theme:'linear-gradient(135deg,#F0F8FF,#D6ECFF)',accentColor:'#4AACDA',text:"A pin is in a tin.\nA tip is on the pin.\nTip the tin.\nIt is in!\nPat the tin.",wordFocus:'Letters: T I P N',unlockReq:'letters',unlockCount:6},
  {id:'story_03',title:"Sam and the Pig",emoji:'🐷',theme:'linear-gradient(135deg,#FFF0F5,#FFD6E7)',accentColor:'#FF6B9D',text:"Sam has a pig.\nThe pig is big.\nThe big pig can dig.\nSam and the pig sit.\nThe pig is Sam's.",wordFocus:'CVC: pig, big, dig, sit',unlockReq:'letters',unlockCount:12},
  {id:'story_04',title:"The Red Hen",emoji:'🐔',theme:'linear-gradient(135deg,#FFF5F0,#FFE0D0)',accentColor:'#FF6B35',text:"The hen is red.\nThe red hen has an egg.\nThe egg is in a den.\nThe hen sat on it.\nThe egg is not big.",wordFocus:'CVC: hen, red, egg, den',unlockReq:'letters',unlockCount:16},
  {id:'story_05',title:"Dot and the Dog",emoji:'🐶',theme:'linear-gradient(135deg,#F0FFF4,#D0F5E0)',accentColor:'#2D6A4F',text:"Dot has a dog.\nThe dog sat on a log.\nThe dog got a bone.\nDot ran to the dog.\nThe dog and Dot nap.",wordFocus:'CVC: dot, dog, log, ran, nap',unlockReq:'cvc',unlockCount:8},
  {id:'story_06',title:"Fun in the Sun",emoji:'☀️',theme:'linear-gradient(135deg,#FFFEF0,#FFF9C4)',accentColor:'#F5C400',text:"The sun is up.\nBen and Pam run.\nThey run and jump.\nBen has fun.\nPam has fun too.\nFun in the sun!",wordFocus:'CVC + sight: run, jump, fun, sun',unlockReq:'cvc',unlockCount:12},
  {id:'story_07',title:"The Blue Bug",emoji:'🐛',theme:'linear-gradient(135deg,#F4F0FF,#E0D6FF)',accentColor:'#7C4DFF',text:"A bug is on a log.\nThe bug is blue.\nThe blue bug can hug.\nThe bug sat on a rug.\nI like the blue bug.",wordFocus:'CVC + sight: bug, hug, rug, like',unlockReq:'cvc',unlockCount:16},
  {id:'story_08',title:"Skip and Flip",emoji:'🐸',theme:'linear-gradient(135deg,#F0FFF8,#C8F7E2)',accentColor:'#00B894',text:"A frog can skip.\nA frog can flip.\nSkip and flip, frog!\nThe frog skips on a rock.\nSkip, flip, plop!",wordFocus:'Blends: skip, flip, frog, plop',unlockReq:'cvc',unlockCount:20},
  {id:'story_09',title:"The Big Ship",emoji:'🚢',theme:'linear-gradient(135deg,#F0F6FF,#CCDEFF)',accentColor:'#2979FF',text:"A big ship is at the dock.\nShe will go to the shop.\nShe had fish and chips.\nThe ship went back.\nWhat a fun trip!",wordFocus:'Digraphs: ship, shop, fish, chips',unlockReq:'sight',unlockCount:10},
  {id:'story_10',title:"Cubby's Big Day",emoji:'🐻',theme:'linear-gradient(135deg,#FFF8F0,#FFE8C8)',accentColor:'#F5A623',text:"Cubby woke up in the morning.\nHe had some toast and jam.\nHe went to play with his friends.\nThey ran and jumped all day.\nCubby was happy at the end!",wordFocus:'Full sentences + sight words',unlockReq:'sight',unlockCount:20},
];

let currentStoryIdx = 0;
let storyViewMode = 'grid';

function isStoryUnlocked(story) {
  const p = profiles.list[profiles.active];
  // Free users: only stories with unlockCount <= 6 (stories 1 & 2)
  if (!settings.isPremium && story.unlockCount > 6) return false;
  const doneMap = {
    letters: p.lettersDone.length, cvc: p.cvcDone.length,
    blends: p.blendsDone.length,  digraphs: p.digraphsDone.length,
    sight: p.sightDone.length,    readit: p.readitDone.length,
  };
  return (doneMap[story.unlockReq] || 0) >= story.unlockCount;
}

function buildStoriesView() {
  currentSection = 'stories'; storyViewMode = 'grid'; buildNav();
  const area = document.getElementById('appArea');
  const p = profiles.list[profiles.active];
  const plEl=document.getElementById('progressLabel'),ppEl=document.getElementById('progressPct'),pfEl=document.getElementById('progressFill'),dotsEl=document.getElementById('sessionDots');
  if(plEl)plEl.textContent=''; if(ppEl)ppEl.textContent=''; if(pfEl)pfEl.style.width='0%'; if(dotsEl)dotsEl.innerHTML='';
  const storiesRead=(p.storiesDone||[]).length, totalStories=DECODABLE_STORIES.length;
  area.innerHTML=`<div class="stories-grid-wrap"><div class="stories-header"><div style="font-size:3rem;line-height:1">🐻</div><h2 style="margin:8px 0 2px;font-size:1.4rem;color:var(--forest)">Cubby's Mini-Books</h2><p style="color:#888;font-size:0.88rem;margin:0 0 10px;">${storiesRead} of ${totalStories} stories read</p><div class="stories-overall-bar"><div class="stories-overall-fill" style="width:${Math.round((storiesRead/totalStories)*100)}%"></div></div></div><div class="stories-grid">${DECODABLE_STORIES.map((story,idx)=>{const unlocked=isStoryUnlocked(story),done=(p.storiesDone||[]).includes(story.id);return `<div class="story-card-thumb${unlocked?'':' story-locked'}${done?' story-done':''}" style="background:${story.theme};border-color:${done?story.accentColor:'transparent'}" onclick="${unlocked?`openStory(${idx})`:'showStoryLocked(this)'}"><div class="story-thumb-emoji">${story.emoji}</div><div class="story-thumb-title">${story.title}</div><div class="story-thumb-focus">${story.wordFocus}</div>${done?`<div class="story-done-badge">✓ Read!</div>`:''} ${!unlocked?`<div class="story-lock-overlay">🔒<br><span>Keep practising!</span></div>`:''}</div>`;}).join('')}</div></div>`;
}

function showStoryLocked(el){el.classList.add('story-shake');setTimeout(()=>el.classList.remove('story-shake'),500);}

function openStory(idx) {
  currentStoryIdx=idx; storyViewMode='read';
  const story=DECODABLE_STORIES[idx], area=document.getElementById('appArea'), p=profiles.list[profiles.active];
  const done=(p.storiesDone||[]).includes(story.id), isLast=idx>=DECODABLE_STORIES.length-1;
  const nextStory=!isLast?DECODABLE_STORIES[idx+1]:null, nextUnlocked=nextStory&&isStoryUnlocked(nextStory);
  const paragraphs=story.text.split('\n').map(line=>`<p class="story-line">${line}</p>`).join('');
  area.innerHTML=`<div class="story-read-wrap"><button class="story-back-btn" onclick="buildStoriesView()">← All Stories</button><div class="story-read-card" style="background:${story.theme}"><div class="story-read-emoji">${story.emoji}</div><h2 class="story-read-title" style="color:${story.accentColor}">${story.title}</h2><div class="story-focus-chip">${story.wordFocus}</div><div class="story-text-block" id="storyTextBlock">${paragraphs}</div><div style="text-align:center;margin-top:20px;"><button class="story-listen-btn" id="storyListenBtn" onclick="listenToStory(${idx})">🔊 Listen to Story</button></div></div><div class="story-actions">${done?`<div class="story-already-done">✓ You already read this one! Amazing!</div>`:''}<button class="story-read-btn${done?' story-read-btn-again':''}" onclick="markStoryRead(${idx})">${done?'🔄 Read Again!':"I Read It! 🎉"}</button>${nextUnlocked?`<button class="story-next-btn" onclick="openStory(${idx+1})">Next Story → ${nextStory.emoji}</button>`:''}</div><div class="story-nav-dots">${DECODABLE_STORIES.map((s,i)=>{const isDone=(p.storiesDone||[]).includes(s.id),isUnlocked=isStoryUnlocked(s);return `<span class="story-nav-dot${i===idx?' active':''}${isDone?' done':''}${!isUnlocked?' locked':''}" onclick="${isUnlocked?`openStory(${i})`:''}" title="${s.title}"></span>`;}).join('')}</div></div>`;
}

function listenToStory(idx) {
  const story=DECODABLE_STORIES[idx]; if(!story) return;
  window.speechSynthesis.cancel();
  if(window.speechSynthesis.paused) window.speechSynthesis.resume();
  const lines=story.text.split('\n'), lineEls=document.querySelectorAll('.story-line');
  const listenBtn=document.getElementById('storyListenBtn');
  if(listenBtn){listenBtn.textContent='⏸ Reading...'; listenBtn.disabled=true;}
  let lineIdx=0;
  function readNextLine(){
    if(lineIdx>=lines.length){lineEls.forEach(el=>el.classList.remove('story-line-active'));if(listenBtn){listenBtn.textContent='🔊 Listen Again';listenBtn.disabled=false;}return;}
    lineEls.forEach(el=>el.classList.remove('story-line-active'));
    if(lineEls[lineIdx]){lineEls[lineIdx].classList.add('story-line-active');lineEls[lineIdx].scrollIntoView({behavior:'smooth',block:'nearest'});}
    const u=new SpeechSynthesisUtterance(lines[lineIdx]);
    u.rate=0.7; u.pitch=1.05; u.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const nice=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Daniel'));
    if(nice) u.voice=nice;
    u.onend=()=>{lineIdx++;setTimeout(readNextLine,350);};
    u.onerror=()=>{lineIdx++;readNextLine();};
    window.speechSynthesis.speak(u);
  }
  readNextLine();
}

function markStoryRead(idx) {
  const story=DECODABLE_STORIES[idx]; if(!story) return;
  const p=profiles.list[profiles.active];
  if(!p.storiesDone) p.storiesDone=[];
  const alreadyDone=p.storiesDone.includes(story.id);
  if(!alreadyDone){p.storiesDone.push(story.id);p.sessions++;p.correct++;p.total++;}
  window.speechSynthesis.cancel(); triggerCelebration();
  const area=document.getElementById('appArea'), isLast=idx>=DECODABLE_STORIES.length-1;
  const nextStory=!isLast?DECODABLE_STORIES[idx+1]:null, nextUnlocked=nextStory&&isStoryUnlocked(nextStory);
  area.innerHTML=`<div class="story-complete-wrap"><div style="font-size:5rem;line-height:1;margin-bottom:12px">🐻</div><h2 style="color:var(--forest);margin:0 0 6px;">Amazing reading!</h2><p style="font-size:1.1rem;color:#555;margin:0 0 4px;font-weight:700;">${story.title}</p><p style="color:#888;font-size:0.9rem;margin:0 0 20px;">${alreadyDone?'You read it again — great practice!':'You read a whole story! ⭐'}</p><div style="font-size:2.5rem;margin-bottom:24px;letter-spacing:8px">⭐⭐⭐</div><div style="display:flex;flex-direction:column;gap:12px;align-items:center;">${nextUnlocked?`<button class="story-read-btn" onclick="openStory(${idx+1})">Next Story: ${nextStory.title} ${nextStory.emoji} →</button>`:!isLast?`<div style="background:var(--forest-pale);border-radius:12px;padding:12px 20px;font-size:0.9rem;color:var(--forest);font-weight:700;text-align:center;">Keep practising to unlock the next story! 🔒</div>`:`<div style="background:linear-gradient(135deg,var(--honey),#FFD07A);border-radius:16px;padding:16px 24px;font-size:1rem;color:var(--bark);font-weight:800;text-align:center;">🏆 You've read ALL of Cubby's stories!<br>You're a real reader!</div>`}<button class="story-next-btn" onclick="buildStoriesView()">← All Stories</button></div></div>`;
  setTimeout(()=>speak(alreadyDone?'Great reading!':'Amazing! You read a whole story!',0.8,1.1),400);
}


// ── UTILS ─────────────────────────────────────────────
function rnd(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── INIT ──────────────────────────────────────────────
window.addEventListener('load', ()=>{
  if('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    // Use addEventListener (not = assignment) to avoid overwriting other handlers
    window.speechSynthesis.addEventListener('voiceschanged', ()=> window.speechSynthesis.getVoices());
    // iOS Safari keepalive: speechSynthesis pauses after ~14s of inactivity.
    // Calling resume() every 10s prevents the stall without audible effect.
    setInterval(()=>{
      if('speechSynthesis' in window && window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }
    }, 10000);
  }
  buildSession();
});
</script>
